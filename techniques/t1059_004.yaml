technique_id: "T1059.004"
name: "Command and Scripting Interpreter: Unix Shell"
tactic: "Execution"
description: "Execute a base64-encoded shell command to simulate obfuscated command execution, then emit a structured JSON event to the purpleteam events log."
commands:
  - "python3 -c \"import base64,subprocess; cmd=base64.b64encode(b'whoami').decode(); subprocess.run(['bash','-c',f'echo {cmd}|base64 -d|bash'],capture_output=True)\""
  - "python3 -c \"import json,datetime,base64; open('/tmp/purpleteam/events.log','a').write(json.dumps({'@timestamp':datetime.datetime.utcnow().isoformat(),'event':{'action':'shell_execution'},'process':{'command_line':'bash -c echo <b64>|base64 -d|bash'},'technique_id':'T1059.004','tactic':'Execution'})+'\\n')\""
cleanup_commands: []
log_source: "purpleteam-events"
detection_query: "event.action:\"shell_execution\" AND process.command_line:*base64*"
expected_fields:
  event.action: "shell_execution"
  process.command_line: "bash -c echo <b64>|base64 -d|bash"
  technique_id: "T1059.004"
