technique_id: "T1070.004"
name: "Indicator Removal on Host: File Deletion"
tactic: "Defense Evasion"
description: "Create a dummy log file and delete it to simulate an attacker removing forensic artifacts, then emit a structured JSON event to the purpleteam events log."
commands:
  - "mkdir -p /tmp/purpleteam/logs"
  - "echo \"dummy log content\" > /tmp/purpleteam/logs/app.log"
  - "rm -f /tmp/purpleteam/logs/app.log"
  - "python3 -c \"import json,datetime; open('/tmp/purpleteam/events.log','a').write(json.dumps({'@timestamp':datetime.datetime.utcnow().isoformat(),'event':{'action':'file_deletion'},'file':{'path':'/tmp/purpleteam/logs/app.log'},'technique_id':'T1070.004','tactic':'Defense Evasion'})+'\\n')\""
cleanup_commands: []
log_source: "purpleteam-events"
detection_query: "event.action:\"file_deletion\" AND file.path:*app.log*"
expected_fields:
  event.action: "file_deletion"
  file.path: "/tmp/purpleteam/logs/app.log"
  technique_id: "T1070.004"
