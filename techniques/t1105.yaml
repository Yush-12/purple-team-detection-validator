technique_id: "T1105"
name: "Ingress Tool Transfer"
tactic: "Command and Control"
description: "Simulate file download using curl to retrieve a remote file and emit a structured JSON event to the purpleteam events log."
commands:
  - "curl -s -o /tmp/purpleteam/downloaded_file.txt https://example.com"
  - "python3 -c \"import json,datetime; open('/tmp/purpleteam/events.log','a').write(json.dumps({'@timestamp':datetime.datetime.utcnow().isoformat(),'event':{'action':'file_download'},'network':{'protocol':'http'},'url':{'full':'https://example.com'},'technique_id':'T1105','tactic':'Command and Control'})+'\\n')\""
cleanup_commands:
  - "rm -f /tmp/purpleteam/downloaded_file.txt"
log_source: "purpleteam-events"
detection_query: "event.action:\"file_download\" AND network.protocol:\"http\""
expected_fields:
  event.action: "file_download"
  network.protocol: "http"
  url.full: "https://example.com"
  technique_id: "T1105"
