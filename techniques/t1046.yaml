id: "T1046"
name: "Network Service Discovery"
tactic: "Discovery"
description: "Scan local loopback subnet using nmap -sn to discover active hosts without root permissions."
reference: "https://attack.mitre.org/techniques/T1046/"
command_linux: "nmap -sn 127.0.0.1/24"
command_windows: "powershell.exe -Command \"1..10 | ForEach-Object { Test-Connection -ComputerName 127.0.0.1 -Count 1 -Quiet }\""
log_event:
  event.action: "network_scan"
  process.name: "nmap"
  process.command_line: "nmap -sn 127.0.0.1/24"
expected_keywords:
  - "network_scan"
  - "nmap"
kql_rule: "event.action: \"network_scan\" AND process.name: \"nmap\""
remediation:
  gap_description: "Network scanning was not detected by the SIEM rules."
  recommendation: "Enable netflow logging or process logging for 'nmap'. Deploy a Kibana rule triggering on processes named 'nmap' performing sweep scans (e.g. >10 ports/hosts in 60s)."
