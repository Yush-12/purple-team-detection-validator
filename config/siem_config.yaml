# Purple Team Detection Validator - SIEM Configuration (Realistic Edition)

# SIEM Connection Details
siem:
  type: "elastic" 
  host: "http://localhost:9200"
  kibana_host: "http://localhost:5601"
  index_pattern: "purpleteam-*"
  
  # Authentication (Choose one - Uncomment if xpack security is enabled in your stack)
  # api_key: "YOUR_API_KEY"
  # username: "elastic"
  # password: "changeme"

# Simulation Runner Settings
runner:
  delay_after_sim_seconds: 5

# Reporting Settings
reporting:
  output_dir: "reports/"
